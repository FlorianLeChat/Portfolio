stages:
    - lint
    - build
    - deploy

default:
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - .npm
        policy: pull-push

lint:eslint:
    stage: lint
    image: node:22-alpine
    before_script:
        - npm ci --cache .npm --prefer-offline
    script:
        - npm run lint
    artifacts:
        when: always
        reports:
            codequality: gl-codequality.json
        expire_in: 1 hour

build:project:
    stage: build
    image: alpine:3
    rules:
        - if: $CI_COMMIT_TAG
          when: on_success
        - if: $CI_COMMIT_BRANCH
          when: manual
    before_script:
        - apk add --no-cache zip
        - mv $ENV_FILE .env
        - echo "" >> .env
        - echo "VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}" >> .env
    script:
        - mv docker/configuration/varnish.vcl varnish.vcl
        - zip -r project.zip .env compose.yml varnish.vcl
    artifacts:
        paths:
            - .env
            - .gitlab/ansible/
            - compose.yml
            - varnish.vcl
            - project.zip
        access: none
        expire_in: 1 hour

build:docker:
    stage: build
    image: docker:29
    needs:
        - build:project
    services:
        - docker:29-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    script:
        - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
        - docker compose build
        - docker compose push

deploy:ansible:
    stage: deploy
    image: alpine:3
    variables:
        GIT_STRATEGY: none
    before_script:
        - apk add --no-cache openssl openssh-client ansible
        - eval $(ssh-agent -s)
        - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
        - mkdir -p ~/.ssh
        - chmod 700 ~/.ssh
        - ssh-keyscan -H 192.168.1.22 >> ~/.ssh/known_hosts
        - echo $ANSIBLE_VAULT_PASSWORD > .vault_password.txt
    script:
        - ansible-playbook -i .gitlab/ansible/hosts.yml --vault-password-file .vault_password.txt .gitlab/ansible/deploy.yml
    dependencies:
        - build:project
