stages:
    - lint
    - test
    - build
    - analyze
    - deploy

default:
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - .npm
        policy: pull-push

lint:eslint:
    stage: lint
    image: node:22-alpine
    before_script:
        - npm ci --cache .npm --prefer-offline
    script:
        - npm run lint
    artifacts:
        when: always
        reports:
            codequality: gl-codequality.json
        expire_in: 1 hour

test:e2e:
    image: node:22-slim
    stage: test
    timeout: 30 minutes
    before_script:
        - mv $ENV_FILE .env
        - npm run build
        - npx playwright install --with-deps
    script:
        - npm run test
    artifacts:
        when: always
        reports:
            junit: playwright-report.xml
        expire_in: 1 hour
    dependencies: []

build:project:
    stage: build
    image: alpine:3
    rules:
        - if: $CI_COMMIT_TAG
          when: on_success
          variables:
            ENVIRONMENT: production
        - if: $CI_COMMIT_BRANCH
          when: manual
          variables:
            ENVIRONMENT: test
    environment: $ENVIRONMENT
    before_script:
        - apk add --no-cache zip
        - mv $ENV_FILE .env
        - echo "" >> .env
        - echo "PORT=$PORT" >> .env
        - echo "VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}" >> .env
        - echo "ENVIRONMENT=$ENVIRONMENT" >> .env
        - echo "NEXT_PUBLIC_VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}" >> .env
    script:
        - mv docker/configuration/varnish.vcl varnish.vcl
        - zip -r project.zip .env compose.yml varnish.vcl
    artifacts:
        paths:
            - .env
            - .gitlab/ansible/
            - compose.yml
            - varnish.vcl
            - project.zip
        access: none
        expire_in: 1 hour

build:docker:
    stage: build
    image: docker:29
    needs:
        - build:project
    services:
        - docker:29-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    script:
        - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
        - docker compose build
        - docker compose push

analyze:sast:
    stage: analyze
    image: $CI_TEMPLATE_REGISTRY_HOST/security-products/semgrep
    script:
        - /analyzer run
    artifacts:
        access: developer
        paths:
            - gl-sast-report.json
        reports:
            sast: gl-sast-report.json
        expire_in: 1 hour
    dependencies: []

analyze:iac:
    stage: analyze
    image: $CI_TEMPLATE_REGISTRY_HOST/security-products/kics
    script:
        - /analyzer run
    artifacts:
        access: developer
        paths:
            - gl-sast-report.json
        reports:
            sast: gl-sast-report.json
        expire_in: 1 hour
    dependencies: []

analyze:secret-detection:
    stage: analyze
    image: $CI_TEMPLATE_REGISTRY_HOST/security-products/secrets
    script:
        - /analyzer run
    artifacts:
        access: developer
        paths:
            - gl-secret-detection-report.json
        reports:
            secret_detection: gl-secret-detection-report.json
        expire_in: 1 hour
    dependencies: []

analyze:docker-container:
    stage: analyze
    image: $CI_TEMPLATE_REGISTRY_HOST/security-products/container-scanning
    script:
        - export CI_APPLICATION_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
        - gtcs scan
    variables:
        CS_DOCKERFILE_PATH: docker/Dockerfile
        CI_APPLICATION_REPOSITORY: $CI_REGISTRY_IMAGE
    artifacts:
        access: developer
        paths:
            - gl-container-scanning-report.json
        reports:
            container_scanning: gl-container-scanning-report.json
        expire_in: 1 hour
    dependencies: []

deploy:ansible:
    stage: deploy
    image: alpine:3
    rules:
        - if: $CI_COMMIT_TAG
          variables:
            ENVIRONMENT: production
        - if: $CI_COMMIT_BRANCH
          variables:
            ENVIRONMENT: test
    variables:
        GIT_STRATEGY: none
    before_script:
        - apk add --no-cache openssl openssh-client ansible
        - eval $(ssh-agent -s)
        - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
        - mkdir -p ~/.ssh
        - chmod 700 ~/.ssh
        - ssh-keyscan -H 192.168.1.22 >> ~/.ssh/known_hosts
        - echo $ANSIBLE_VAULT_PASSWORD > .vault_password.txt
    script:
        - ansible-playbook -i .gitlab/ansible/hosts.yml --vault-password-file .vault_password.txt .gitlab/ansible/deploy.yml -e "deploy=$ENVIRONMENT"
    dependencies:
        - build:project
