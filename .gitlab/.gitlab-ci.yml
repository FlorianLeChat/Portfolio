stages:
    - lint
    - test
    - build
    - analyze

default:
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - .npm
        policy: pull-push

lint:eslint:
    stage: lint
    image: node:22-alpine
    before_script:
        - npm ci --cache .npm --prefer-offline
    script:
        - npm run lint
    artifacts:
        when: always
        reports:
            codequality: gl-codequality.json
        expire_in: 1 hour

test:e2e:
    image: node:22
    stage: test
    timeout: 15 minutes
    before_script:
        - npm ci --cache .npm --prefer-offline
        - npm run build
        - npx playwright install --with-deps
    script:
        - npm run test
    artifacts:
        when: always
        paths:
            - test-results/
        access: developer
        reports:
            junit: playwright-report.xml
        expire_in: 1 hour
    dependencies: []

build:node:
    stage: build
    image: node:22-alpine
    before_script:
        - npm ci --cache .npm --prefer-offline
    script:
        - export PUBLIC_VERSION=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
        - npm run build
    artifacts:
        paths:
            - build/
        expire_in: 1 hour
    dependencies: []

analyze:sast:
    stage: analyze
    image: $CI_TEMPLATE_REGISTRY_HOST/security-products/semgrep
    script:
        - /analyzer run
    artifacts:
        access: developer
        paths:
            - gl-sast-report.json
        reports:
            sast: gl-sast-report.json
        expire_in: 1 hour
    dependencies: []

analyze:iac:
    stage: analyze
    image: $CI_TEMPLATE_REGISTRY_HOST/security-products/kics
    script:
        - /analyzer run
    artifacts:
        access: developer
        paths:
            - gl-sast-report.json
        reports:
            sast: gl-sast-report.json
        expire_in: 1 hour
    dependencies: []

analyze:secret-detection:
    stage: analyze
    image: $CI_TEMPLATE_REGISTRY_HOST/security-products/secrets
    script:
        - /analyzer run
    artifacts:
        access: developer
        paths:
            - gl-secret-detection-report.json
        reports:
            secret_detection: gl-secret-detection-report.json
        expire_in: 1 hour
    dependencies: []
